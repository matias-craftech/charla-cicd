# Mantiene actualizadas las versiones de las GitHub Actions automaticamente.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Junta TODAS las actualizaciones de actions en un unico PR (evita la avalancha).
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5